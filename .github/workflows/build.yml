name: Build

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write   # needed to create/update the rolling release

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Show toolchain
        run: |
          sw_vers
          xcodebuild -version
          swift --version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build (Release)
        run: |
          set -o pipefail
          xcodebuild \
            -project PreviewAgent.xcodeproj \
            -scheme PreviewAgent \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Verify app bundle
        run: test -d build/Build/Products/Release/PreviewAgent.app

      - name: Create DMG
        run: |
          chmod +x scripts/make_dmg.sh
          ./scripts/make_dmg.sh \
            build/Build/Products/Release/PreviewAgent.app \
            PreviewAgent.dmg

      # Upload as a plain artifact so it's visible in the Actions run detail page.
      - name: Upload DMG artifact
        uses: actions/upload-artifact@v7
        with:
          name: PreviewAgent
          path: PreviewAgent.dmg
          retention-days: 30

      # On pushes to main: update (or create) a rolling "latest" pre-release
      # so the DMG is always downloadable from the Releases page.
      - name: Update rolling release (main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          BODY="自動ビルド（main ブランチ最新: \`${SHORT_SHA}\`）

          ## インストール
          1. \`PreviewAgent.dmg\` をダウンロード
          2. ダブルクリックして開き、\`PreviewAgent.app\` を **Applications** にドラッグ
          3. 初回起動時は以下をターミナルで実行（隔離属性の解除）：
             \`\`\`sh
             sudo xattr -dr com.apple.quarantine /Applications/PreviewAgent.app
             \`\`\`
          4. ダブルクリックで起動

          ## 必要なもの
          - [Claude Code CLI](https://docs.anthropic.com/ja/docs/claude-code)（\`claude\` コマンドが PATH にあること）"

          # Delete existing 'latest' release and tag if present, then recreate
          gh release delete latest --repo "${{ github.repository }}" --yes 2>/dev/null || true
          git push origin :refs/tags/latest 2>/dev/null || true

          gh release create latest PreviewAgent.dmg \
            --repo "${{ github.repository }}" \
            --title "Latest build (main)" \
            --notes "$BODY" \
            --prerelease \
            --target "${{ github.sha }}"

name: Release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Show toolchain
        run: |
          sw_vers
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build Release
        run: |
          set -o pipefail
          xcodebuild \
            -project PreviewAgent.xcodeproj \
            -scheme PreviewAgent \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package DMG
        run: |
          chmod +x scripts/make_dmg.sh
          ./scripts/make_dmg.sh \
            build/Build/Products/Release/PreviewAgent.app \
            PreviewAgent-${{ github.ref_name }}.dmg

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: PreviewAgent-${{ github.ref_name }}.dmg
          generate_release_notes: true
          body: |
            ## インストール

            1. `PreviewAgent-${{ github.ref_name }}.dmg` をダウンロード
            2. ダブルクリックして開き、`PreviewAgent.app` を **Applications** にドラッグ
            3. **ターミナルで以下を 1 回実行**（未署名アプリの隔離属性を解除。パスワードを聞かれます）：
               ```sh
               sudo xattr -dr com.apple.quarantine /Applications/PreviewAgent.app
               ```
            4. ダブルクリックで起動

            ### 「"PreviewAgent" は壊れているため開けません」と出る場合

            未署名アプリに macOS が付ける `com.apple.quarantine` 属性のせいで、アプリ自体は壊れていません。上のステップ 3 のコマンドで隔離属性を解除してください。

            ## 別途必要なもの

            - [Claude Code CLI](https://docs.claude.com/en/docs/claude-code) (`claude` コマンド)
            - ターミナルで `claude /login` を一度実行

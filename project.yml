name: PreviewAgent
options:
  bundleIdPrefix: com.ryosuke
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

targets:
  PreviewAgent:
    type: application
    platform: macOS
    sources:
      - path: Sources/PreviewAgent
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ryosuke.PreviewAgent
        PRODUCT_NAME: PreviewAgent
        MARKETING_VERSION: "0.1"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Sources/PreviewAgent/Info.plist
        SWIFT_VERSION: "5.10"
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
        ENABLE_HARDENED_RUNTIME: NO
        SWIFT_STRICT_CONCURRENCY: minimal
